<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Chess Feed</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: #81c784;
    }

    #login-panel {
      background: #16213e;
      padding: 30px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 300px;
      margin-bottom: 20px;
    }

    #login-panel input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #0f3460;
      color: #eee;
      font-size: 1rem;
    }

    #login-panel button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #81c784;
      color: #1a1a2e;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }

    #login-panel button:hover { background: #66bb6a; }

    #login-status {
      font-size: 0.9rem;
      text-align: center;
      color: #81c784;
    }

    #game-panel {
      display: none;
      flex-direction: row;
      gap: 30px;
      align-items: flex-start;
      width: 100%;
      max-width: 900px;
    }

    #board-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #board {
      width: 400px;
    }

    #eval-bar-wrap {
      width: 400px;
      background: #16213e;
      border-radius: 8px;
      overflow: hidden;
      height: 24px;
      position: relative;
    }

    #eval-bar {
      height: 100%;
      width: 50%;
      background: #81c784;
      transition: width 0.5s ease;
    }

    #eval-label {
      position: absolute;
      top: 3px;
      width: 100%;
      text-align: center;
      font-size: 0.8rem;
      color: #1a1a2e;
      font-weight: bold;
    }

    #right-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex: 1;
    }

    #move-list {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.95rem;
      line-height: 1.8;
    }

    #engine-panel {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
    }

    #engine-panel h3 {
      color: #81c784;
      margin-bottom: 10px;
    }

    #best-move {
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
    }

    #engine-lines {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #aaa;
      line-height: 1.8;
    }

    #status {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>♟ Live Chess Feed</h1>

<div id="login-panel">
  <input type="text" id="username" placeholder="Chess.com Username">
  <input type="password" id="password" placeholder="Chess.com Password">
  <button onclick="login()">Connect to Game</button>
  <div id="login-status"></div>
</div>

<div id="game-panel">
  <div id="board-wrap">
    <div id="board"></div>
    <div id="eval-bar-wrap">
      <div id="eval-bar"></div>
      <div id="eval-label">0.0</div>
    </div>
    <div id="status">Waiting for game...</div>
  </div>
  <div id="right-panel">
    <div id="move-list">No moves yet</div>
    <div id="engine-panel">
      <h3>Stockfish Analysis</h3>
      <div id="best-move">--</div>
      <div id="engine-lines"></div>
    </div>
  </div>
</div>

<script>
  // Init chessboard
  const board = Chessboard('board', {
    position: 'start',
    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
  });

  // Init Stockfish
  const stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
  let lastFen = null;

  stockfish.onmessage = function(e) {
    const msg = e.data;
    if (msg.startsWith('info depth')) {
      const scoreMatch = msg.match(/score cp (-?\d+)/);
      const pvMatch = msg.match(/pv (.+)/);
      if (scoreMatch && pvMatch) {
        const score = parseInt(scoreMatch[1]) / 100;
        const moves = pvMatch[1].split(' ').slice(0, 3).join(' ');
        document.getElementById('best-move').textContent = `Best: ${moves}`;
        document.getElementById('engine-lines').textContent = `Score: ${score > 0 ? '+' : ''}${score}`;
        updateEvalBar(score);
      }
    }
  };

  function updateEvalBar(score) {
    const clamped = Math.max(-5, Math.min(5, score));
    const pct = ((clamped + 5) / 10) * 100;
    document.getElementById('eval-bar').style.width = pct + '%';
    document.getElementById('eval-label').textContent = (score > 0 ? '+' : '') + score.toFixed(1);
  }

  function analyzePosition(fen) {
    stockfish.postMessage('position fen ' + fen);
    stockfish.postMessage('go depth 15');
  }

  async function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    document.getElementById('login-status').textContent = 'Connecting...';

    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();
    if (data.success) {
      document.getElementById('login-panel').style.display = 'none';
      document.getElementById('game-panel').style.display = 'flex';
      startPolling();
    } else {
      document.getElementById('login-status').textContent = 'Login failed, try again';
    }
  }

  function startPolling() {
    setInterval(async () => {
      try {
        const res = await fetch('/fen');
        const data = await res.json();

        if (data.fen && data.fen !== 'start' && data.fen !== lastFen) {
          lastFen = data.fen;
          board.position(data.fen);
          analyzePosition(data.fen);
          document.getElementById('status').textContent = 'Live ♟';

          // Update move list
          if (data.history && data.history.length > 0) {
            document.getElementById('move-list').textContent =
              data.history.map((f, i) => `${i + 1}. ${f}`).join('\n');
          }
        }
      } catch(e) {
        document.getElementById('status').textContent = 'Waiting for game...';
      }
    }, 1000);
  }
</script>

</body>
</html>
